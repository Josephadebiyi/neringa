services:
  - type: web
    name: neringa-backend
    runtime: node
    plan: free
    rootDir: BAGO_BACKEND
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
  - type: web
    name: neringa-admin
    runtime: static
    rootDir: ADMIN_NEW
    buildCommand: ADMIN_BASE_PATH=/ npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
