<svg width="1200" height="1600" viewBox="0 0 1200 1600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#054752;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#5845D8;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#5845D8;stop-opacity:0.85" />
    </linearGradient>

    <linearGradient id="roadGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#708c91;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#054752;stop-opacity:0.5" />
    </linearGradient>

    <linearGradient id="busGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f4f5;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="carGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0f1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1600" fill="url(#bgGradient)"/>

  <!-- Decorative circles/blobs -->
  <circle cx="150" cy="200" r="120" fill="#ffffff" opacity="0.05"/>
  <circle cx="1000" cy="400" r="180" fill="#ffffff" opacity="0.07"/>
  <circle cx="200" cy="1200" r="150" fill="#5845D8" opacity="0.1"/>
  <circle cx="950" cy="1000" r="200" fill="#054752" opacity="0.08"/>

  <!-- Road illustration -->
  <path d="M 400 0 Q 450 400 500 800 T 600 1600" stroke="#ffffff" stroke-width="120" opacity="0.08" fill="none"/>
  <path d="M 440 0 L 460 150 M 440 200 L 460 350 M 440 400 L 460 550 M 440 600 L 460 750 M 440 800 L 460 950 M 440 1000 L 460 1150 M 440 1200 L 460 1350 M 440 1400 L 460 1550" stroke="#ffffff" stroke-width="4" opacity="0.3" stroke-dasharray="40,40"/>

  <!-- Bus illustration (simplified) -->
  <g transform="translate(700, 400)">
    <!-- Bus body -->
    <rect x="0" y="20" width="300" height="180" rx="20" fill="url(#busGradient)" opacity="0.95"/>
    <rect x="0" y="20" width="300" height="180" rx="20" fill="none" stroke="#5845D8" stroke-width="4" opacity="0.3"/>

    <!-- Windows -->
    <rect x="20" y="45" width="60" height="50" rx="8" fill="#5845D8" opacity="0.2"/>
    <rect x="90" y="45" width="60" height="50" rx="8" fill="#5845D8" opacity="0.2"/>
    <rect x="160" y="45" width="60" height="50" rx="8" fill="#5845D8" opacity="0.2"/>
    <rect x="230" y="45" width="50" height="50" rx="8" fill="#5845D8" opacity="0.2"/>

    <!-- Details -->
    <circle cx="80" cy="210" r="25" fill="#054752" opacity="0.3"/>
    <circle cx="220" cy="210" r="25" fill="#054752" opacity="0.3"/>
    <rect x="250" y="100" width="40" height="30" rx="5" fill="#5845D8" opacity="0.15"/>
  </g>

  <!-- Car illustration (simplified) -->
  <g transform="translate(150, 900)">
    <!-- Car body -->
    <path d="M 50 80 L 30 80 Q 20 80 20 70 L 20 50 Q 40 30 80 30 L 140 30 Q 160 30 170 40 L 190 70 Q 190 80 180 80 L 160 80 Q 200 80 200 60 L 200 50 L 180 20 Q 170 10 150 10 L 90 10 Q 60 10 50 30 L 30 60 Q 30 80 50 80 Z" fill="url(#carGradient)" opacity="0.9"/>
    <path d="M 50 80 L 30 80 Q 20 80 20 70 L 20 50 Q 40 30 80 30 L 140 30 Q 160 30 170 40 L 190 70 Q 190 80 180 80 L 160 80" fill="none" stroke="#5845D8" stroke-width="3" opacity="0.3"/>

    <!-- Windows -->
    <path d="M 60 35 L 50 50 L 90 50 L 85 35 Z" fill="#5845D8" opacity="0.2"/>
    <path d="M 120 35 L 110 50 L 165 50 L 170 35 Z" fill="#5845D8" opacity="0.2"/>

    <!-- Wheels -->
    <circle cx="60" cy="80" r="18" fill="#054752" opacity="0.3"/>
    <circle cx="160" cy="80" r="18" fill="#054752" opacity="0.3"/>
  </g>

  <!-- Floating icons/shapes -->
  <g opacity="0.15">
    <!-- Location pins -->
    <path d="M 900 250 C 900 235 912 223 927 223 C 942 223 954 235 954 250 C 954 265 927 285 927 285 C 927 285 900 265 900 250 Z" fill="#ffffff"/>
    <circle cx="927" cy="248" r="6" fill="#054752"/>

    <path d="M 300 600 C 300 585 312 573 327 573 C 342 573 354 585 354 600 C 354 615 327 635 327 635 C 327 635 300 615 300 600 Z" fill="#ffffff"/>
    <circle cx="327" cy="598" r="6" fill="#054752"/>

    <!-- Stars -->
    <path d="M 850 800 L 855 815 L 870 815 L 858 824 L 863 839 L 850 830 L 837 839 L 842 824 L 830 815 L 845 815 Z" fill="#ffffff"/>
    <path d="M 250 350 L 255 365 L 270 365 L 258 374 L 263 389 L 250 380 L 237 389 L 242 374 L 230 365 L 245 365 Z" fill="#ffffff"/>
  </g>

  <!-- Text overlay effect (abstract) -->
  <g opacity="0.05">
    <text x="100" y="1500" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="#ffffff">BAGGO</text>
  </g>

  <!-- Connecting dots pattern -->
  <g opacity="0.1">
    <circle cx="500" cy="300" r="4" fill="#ffffff"/>
    <circle cx="700" cy="200" r="4" fill="#ffffff"/>
    <circle cx="600" cy="500" r="4" fill="#ffffff"/>
    <circle cx="800" cy="600" r="4" fill="#ffffff"/>
    <line x1="500" y1="300" x2="700" y2="200" stroke="#ffffff" stroke-width="1"/>
    <line x1="700" y1="200" x2="600" y2="500" stroke="#ffffff" stroke-width="1"/>
    <line x1="600" y1="500" x2="800" y2="600" stroke="#ffffff" stroke-width="1"/>
  </g>
</svg>