nchor="start" fill="#6B7280">Tracking: BAGO-12345678</text><text x="195" y="206.8" font-family="'Plus Jakarta Sans','Plus Jakarta Sans Variable',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11" font-weight="600" letter-spacing="-0.4" text-anchor="middle" fill="#9CA3AF">Today</text><rect x="20" y="224" width="196.93" height="70" rx="16" ry="16" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/><text x="34" y="243.4" font-family="'Plus Jakarta Sans','Plus Jakarta Sans Variable',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" font-weight="500" letter-spacing="-0.4" text-anchor="start" fill="#1F2937">Hi! I saw your trip to</text><text x="34" y="261.4" font-family="'Plus Jakarta Sans','Plus Jakarta Sans Variable',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" font-weight="500" letter-spacing="-0.4" text-anchor="start" fill="#1F2937">London. Can you carry a</text><text x="34" y="279.4" font-family="'Plus Jakarta Sans','Plus Jakarta Sans Variable',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" font-weight="500" letter-spacing="-0.4" text-anchor="start" fill="#1F2937">small package?</text><rect x="195.1" y="306" width="174.9" height="52" rx="16" ry="16" fill="#5C4BFD"/><text x="209.1" y="325.4" font-family="'Plus Jakarta Sans','Plus Jakarta Sans Variable',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" font-weight="500" letter-spacing="-0.4" text-anchor="start" fill="#FFFFFF">Hi Donny! Yes I can.</text><text x="209.1" y="343.4" font-family="'Plus Jakarta Sans','Plus Jakarta Sans Variable',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" font-weight="500" letter-spacing="-0.4" text-anchor="start" fill="#FFFFFF">What&#x27;s the weight?</text><rect x="20" y="370" width="196.93" height="52" rx="16" ry="16" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/><text x="34" y="389.4" font-family="'Plus Jakarta Sans','Plus Jakarta Sans Variable',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" font-weight="500" letter-spacing="-0.4" text-anchor="start" fill="#1F2937">About 1.8 kg — a winter</text><text x="34" y="407.4" font-family="'Plus Jakarta Sans','Plus Jakarta Sans Variable',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" font-weight="500" letter-spacing="-0.4" text-anchor="start" fill="#1F2937">jacket.</text><rect x="165.72" y="434" width="204.28" height="52" rx="16" ry="16" fill="#5C4BFD"/><text x="179.72" y="453.4" font-family="'Plus Jakarta Sans','Plus Jakarta Sans Variable',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" font-weight="500" letter-spacing="-0.4" text-anchor="start" fill="#FFFFFF">Perfect. I&#x27;ll be at the</text><text x="179.72" y="471.4" font-family="'Plus Jakarta Sans','Plus Jakarta Sans Variable',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" font-weight="500" letter-spacing="-0.4" text-anchor="start" fill="#FFFFFF">airport by 8am tomorrow.</text><rect x="0" y="760" width="390" height="92" rx="0" ry="0" fill="#FFFFFF"/><line x1="0" y1="760" x2="390" y2="760" stroke="#E5E7EB" stroke-width="1" stroke-linecap="round"/><g transform="translate(19,775) scale(0.92)"><g fill="none" stroke="#6B7280" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round"><path d="M8 11.5 V8 a4 4 0 0 1 8 0 V14.5 a6 6 0 0 1 -12 0 V9.5"/></g></g><rect x="52" y="772" width="280" height="40" rx="20" ry="20" fill="#F3F4F6"/><text x="68" y="794.4" font-family="'Plus Jakarta Sans','Plus Jakarta Sans Variable',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" font-weight="500" letter-spacing="-0.4" text-anchor="start" fill="#9CA3AF">Type a message...</text><circle cx="352" cy="792" r="20" fill="#5C4BFD"/><g transform="translate(343,783) scale(0.75)"><g fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 3.5 L3 11.2 L10.2 13.8 L12.8 21 Z"/><line x1="10.2" y1="13.8" x2="21" y2="3.5"/></g></g><rect x="128" y="835" width="134" height="5" rx="2.5" ry="2.5" fill="#0A0A0A" fil