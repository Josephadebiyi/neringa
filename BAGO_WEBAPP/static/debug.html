<!DOCTYPE html>
<html>
<head>
    <title>Debug Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .box {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 { color: #667eea; }
        .test {
            background: #f0f0f0;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            font-family: monospace;
        }
        .success { background: #d4edda; color: #155724; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }
        button:hover { background: #5568d3; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🔍 Bago Debug Console</h1>

        <div class="test success">
            ✅ Server is running correctly
        </div>

        <div class="test">
            <strong>Frontend URL:</strong> http://localhost:5173/
        </div>

        <div class="test">
            <strong>Backend URL:</strong> http://localhost:3000
        </div>

        <div class="test">
            <strong>API URL:</strong> <span id="apiUrl">Loading...</span>
        </div>

        <hr style="margin: 20px 0;">

        <h2>Browser Console Check</h2>
        <p>Open your browser console (F12) and check for errors.</p>
        <div id="consoleOutput" class="test" style="max-height: 200px; overflow-y: auto;">
            <strong>Console Output:</strong><br>
            <span id="logs">Checking...</span>
        </div>

        <hr style="margin: 20px 0;">

        <h2>Quick Fixes</h2>
        <button onclick="clearStorage()">Clear All Storage</button>
        <button onclick="testAPI()">Test API Connection</button>
        <button onclick="location.href='/'">Go to Home</button>

        <div id="result" style="margin-top: 20px;"></div>
    </div>

    <script>
        // Check API URL
        fetch('/src/api.js')
            .then(r => r.text())
            .then(text => {
                const match = text.match(/VITE_API_URL.*"([^"]+)"/);
                document.getElementById('apiUrl').textContent =
                    match ? match[1] : 'Using environment variable';
            });

        // Capture console logs
        const logs = [];
        const originalLog = console.log;
        const originalError = console.error;

        console.log = function(...args) {
            logs.push('LOG: ' + args.join(' '));
            updateLogs();
            originalLog.apply(console, args);
        };

        console.error = function(...args) {
            logs.push('❌ ERROR: ' + args.join(' '));
            updateLogs();
            originalError.apply(console, args);
        };

        function updateLogs() {
            document.getElementById('logs').innerHTML =
                logs.slice(-5).join('<br>') || 'No errors detected';
        }

        function clearStorage() {
            localStorage.clear();
            sessionStorage.clear();
            document.getElementById('result').innerHTML =
                '<div class="test success">✅ Storage cleared! Click "Go to Home" button.</div>';
        }

        async function testAPI() {
            const result = document.getElementById('result');
            result.innerHTML = '<div class="test">Testing API connection...</div>';

            try {
                const response = await fetch('http://localhost:3000/api/bago/getuser', {
                    headers: {
                        'Authorization': 'Bearer test'
                    }
                });
                result.innerHTML = `<div class="test success">✅ API responded with status: ${response.status}</div>`;
            } catch (error) {
                result.innerHTML = `<div class="test" style="background: #f8d7da; color: #721c24;">❌ API Error: ${error.message}</div>`;
            }
        }

        // Check localStorage
        console.log('LocalStorage user:', localStorage.getItem('user'));
        console.log('LocalStorage auth_token:', localStorage.getItem('auth_token'));
        console.log('Debug page loaded successfully');
    </script>
</body>
</html>
