name: bago_app
description: Bago - P2P International Logistics Platform
publish_to: 'none'
version: 1.0.0+54

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # HTTP client
  socket_io_client: ^3.1.4
  dio: ^5.8.0

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Google Sign-In
  google_sign_in: ^6.2.2

  # Firebase
  firebase_core: ^3.10.0
  firebase_messaging: ^15.2.0

  # Supabase
  supabase_flutter: ^2.9.1

  # Biometric auth
  local_auth: ^2.3.0

  # Payments
  flutter_stripe: ^11.3.0

  # Location
  geolocator: ^13.0.2

  # Image picker (camera + gallery)
  image_picker: ^1.1.2

  # File picker (PDF + documents)
  file_picker: ^8.1.7

  # Fonts (Plus Jakarta Sans via google_fonts)
  google_fonts: ^6.2.1

  # SVG support
  flutter_svg: ^2.0.14

  # Cached network images
  cached_network_image: ^3.4.1

  # Skeleton loading
  shimmer: ^3.0.0

  # Animations
  flutter_animate: ^4.5.2

  # PDF generation / sharing
  pdf: ^3.11.3
  printing: ^5.13.4
  
  # Native splash control
  flutter_native_splash: ^2.4.4

  # WebView (for KYC / Paystack)
  webview_flutter: ^4.11.0

  # URL launcher
  url_launcher: ^6.3.1

  # Internationalisation / date formatting + localisation
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter

  # OTP input
  pinput: ^5.0.1

  # Country picker (signup)
  country_picker: ^2.0.26

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  intl_utils: ^2.8.7
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: assets/images/splash-icon.png
  remove_alpha_ios: true
  adaptive_icon_background: "#5C4BFD"
  adaptive_icon_foreground: assets/images/splash-icon.png

flutter_native_splash:
  color: "#5C4BFD"
  color_dark: "#5C4BFD"
  image: assets/images/bago-logo-white.png
  image_dark: assets/images/bago-logo-white.png
  ios_content_mode: scaleAspectFit
  fullscreen: true
  android: true
  ios: true
  web: false

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
